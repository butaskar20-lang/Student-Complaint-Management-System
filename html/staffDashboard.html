<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard - SCMS</title>

  <link rel="stylesheet" href="../css/staffDashboardstyle.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page">

<header class="topbar">
  <div class="topbar-left">
    <span class="welcome-msg">Welcome, <strong>Staff!</strong></span>
  </div>

  <div class="topbar-right">

    <a href="staffProfile.html" class="icon-btn">
      <i class="fa-solid fa-user"></i>
    </a>

    <a href="../php/logout.php" class="icon-btn">
      <i class="fa-solid fa-power-off"></i>
    </a>

  </div>

</header>

<div class="layout">

  <aside class="sidebar">
    <nav class="side-nav">
      <a href="staffDashboard.html" class="side-link active">Dashboard</a>
      <a href="manage_complaint.html" class="side-link">Manage Complaint</a>
      <a href="manageFeedback.html" class="side-link">Manage Feedback</a>
    </nav>
  </aside>

  <main class="main-content">

    <div class="admin-action-row">

      <!-- INSERT -->
      <div class="admin-card" onclick="openModal('insertModal')">
        <div class="admin-icon">
          <svg viewBox="0 0 100 100" width="90" height="90">
            <circle cx="50" cy="28" r="16" fill="none" stroke="#fff" stroke-width="3.5"/>
            <path d="M18 80 Q18 58 50 58 Q82 58 82 80" fill="none" stroke="#fff" stroke-width="3.5"/>
            <rect x="32" y="58" width="36" height="22" rx="3" fill="none" stroke="#fff" stroke-width="2.5"/>
            <line x1="50" y1="58" x2="50" y2="80" stroke="#fff" stroke-width="2"/>
          </svg>
        </div>
        <button class="action-btn">Insert</button>
      </div>

      <!-- UPDATE -->
      <div class="admin-card" onclick="openModal('updateModal')">
        <div class="admin-icon">
          <svg viewBox="0 0 100 100" width="90" height="90">
            <circle cx="42" cy="28" r="16" fill="none" stroke="#fff" stroke-width="3.5"/>
            <path d="M10 80 Q10 58 42 58 Q74 58 74 80" fill="none" stroke="#fff" stroke-width="3.5"/>
            <circle cx="74" cy="62" r="12" fill="none" stroke="#fff" stroke-width="2.5"/>
            <circle cx="74" cy="62" r="5" fill="none" stroke="#fff" stroke-width="2"/>
          </svg>
        </div>
        <button class="action-btn">Update</button>
      </div>

      <!-- REMOVE -->
      <div class="admin-card" onclick="openModal('removeModal')">
        <div class="admin-icon">
          <svg viewBox="0 0 100 100" width="90" height="90">
            <circle cx="50" cy="50" r="36" fill="none" stroke="#fff" stroke-width="4"/>
            <line x1="32" y1="32" x2="68" y2="68" stroke="#fff" stroke-width="5"/>
            <line x1="68" y1="32" x2="32" y2="68" stroke="#fff" stroke-width="5"/>
          </svg>
        </div>
        <button class="action-btn">Remove</button>
      </div>

    </div>

  </main>
</div>

<!-- INSERT MODAL -->
<div class="modal-overlay" id="insertModal">
  <div class="modal-box">

    <div class="modal-header">
      <h2>Insert Student</h2>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Student ID</label>
        <input type="text" class="form-input" id="ins-id">
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-input" id="ins-name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-input" id="ins-email">
      </div>

      <div class="form-group">
        <label>Temporary Password</label>
        <input type="password" class="form-input" id="ins-pass">
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('insertModal')">Cancel</button>
      <button class="btn-confirm" onclick="insertStudent()">Insert</button>
    </div>

  </div>
</div>

<!-- UPDATE MODAL -->
<div class="modal-overlay" id="updateModal">

  <div class="modal-box">

    <div class="modal-header">
      <h2>Update Student</h2>
    </div>

    <div class="modal-body">

      <!-- SEARCH STUDENT -->

      <div class="form-group">

        <label>Student ID</label>

        <div class="search-update-row">

          <input
            type="text"
            class="form-input"
            id="upd-id">

          <button
            type="button"
            class="search-student-btn"
            onclick="searchStudent()">

            Search

          </button>

        </div>

      </div>



      <!-- STUDENT INFO -->

      <div id="studentResult"
      style="display:none;">

        <div class="form-group">

          <label>Student Name</label>

          <input
            type="text"
            class="form-input"
            id="upd-name"
            readonly>

        </div>

        <div class="form-group">

          <label>New Password</label>

          <input
            type="password"
            class="form-input"
            id="upd-pass">

        </div>

      </div>

    </div>

    <div class="modal-footer">

      <button
        class="btn-cancel"
        onclick="closeModal('updateModal')">

        Cancel

      </button>

      <button
        class="btn-confirm"
        onclick="updateStudent()">

        Update

      </button>

    </div>

  </div>

</div>

<!-- REMOVE COMPLAINT MODAL -->
<div class="modal-overlay" id="removeModal">
  <div class="modal-box">

    <div class="modal-header">
      <h2>Remove Complaint</h2>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Complaint Number</label>
        <input type="text" class="form-input" id="rem-id">
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('removeModal')">Cancel</button>
      <button class="btn-confirm" onclick="removeComplaint()">Remove</button>
    </div>

  </div>
</div>

<script src="../javascript/staffDashboard.js"></script>
</body>
</html>
