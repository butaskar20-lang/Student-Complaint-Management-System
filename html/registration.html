<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Student Registration</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo-title">
      Technova Smart System | Intelligence Meets Infrastructure
    </div>

   <!-- <div class="nav-links">
      <a href="#">About Us</a>
      <a href="#">Home</a>
    </div> -->
  </nav>

  <!-- Main Container -->
  <div class="main-container">

  	<!-- Left Section -->
    <div class="left-section">
      <img src="../assets/images/logo.png" alt="Logo" class="logo">
      <h1>
        Student Complaint <br>
        Management System
      </h1>
    </div>

    <!-- Right Section -->
	 <!-- The right section contains the registration form, which includes input fields for the student ID, name, email, contact number, and password. 
	  The form is designed to submit the registration information to the server for processing and account creation. -->
    <div class="right-section">
      <h2>Register Account</h2>
			<form id="registerForm" action="../php/register.php" method="POST">
				<div class="input-box">
					<input type="text"
						name="studentID"
						placeholder="Enter ID"
						required>
				</div>

				<div class="input-box">
					<input type="text"
								name="stuName"
								placeholder="Enter Name"
								required>
				</div>

				<div class="input-box">
					<input type="email"
						name="stuEmail"
						placeholder="Enter Student Email"
						required>
				</div>

				<div class="input-box">
					<input type="text"
						name="stuContactNum"
						placeholder="Enter Phone Number"
						required>
				</div>

				<div class="input-box">
					<input type="password"
						id="psw"
							name="stuPassword"
							placeholder="Enter Password"
							pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
							title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
							required>
				</div>

				<button type="submit" class="main-btn">
					Sign Up
				</button>

				<!-- Password Message -->
				<div id="message">
					<h3>Password must contain the following:</h3>
					<p id="letter" class="invalid">
						A <b>lowercase</b> letter
					</p>

					<p id="capital" class="invalid">
						A <b>capital (uppercase)</b> letter
					</p>

					<p id="number" class="invalid">
						A <b>number</b>
					</p>

					<p id="length" class="invalid">
						Minimum <b>8 characters</b>
					</p>
				</div>
      </form>
    </div>
  </div>
	<script src="../javascript/register.js"></script>
</body>
</html>
